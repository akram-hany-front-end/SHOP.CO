<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <section class="testimonials">
      <div class="header">
        <h2>OUR HAPPY CUSTOMERS</h2>
        <div class="arrows">
          <button id="prev">
            <i class="fa fa-arrow-right" aria-hidden="true"></i>
          </button>
          <button id="next">
            <i class="fa fa-arrow-left" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <div class="slider">
        <div class="track">
          <div class="card">
            <div class="stars">★★★★★</div>
            <h4>Sarah M. <span class="check">✔</span></h4>
            <p>I'm blown away by the quality and style...</p>
          </div>

          <div class="card">
            <div class="stars">★★★★★</div>
            <h4>Alex K. <span class="check">✔</span></h4>
            <p>Finding clothes that align with my personal style...</p>
          </div>

          <div class="card">
            <div class="stars">★★★★★</div>
            <h4>James L. <span class="check">✔</span></h4>
            <p>As someone who's always on the lookout...</p>
          </div>

          <div class="card">
            <div class="stars">★★★★★</div>
            <h4>Moody R. <span class="check">✔</span></h4>
            <p>Unique fashion pieces and amazing quality...</p>
          </div>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
